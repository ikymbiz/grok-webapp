<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grok Mobile Chat</title>
    <style>
        :root {
            --bg-color: #000;
            --text-color: #fff;
            --accent-color: #1d9bf0;
            --msg-user: #262626;
            --msg-grok: #000;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 20px;
            line-height: 1.5;
            font-size: 16px;
            word-wrap: break-word;
        }
        .user {
            align-self: flex-end;
            background-color: var(--accent-color);
            border-bottom-right-radius: 4px;
        }
        .grok {
            align-self: flex-start;
            background-color: var(--msg-user);
            border: 1px solid #333;
            border-bottom-left-radius: 4px;
        }
        #input-area {
            padding: 15px;
            border-top: 1px solid #333;
            display: flex;
            gap: 10px;
            background: #000;
        }
        input {
            flex: 1;
            padding: 12px;
            border-radius: 25px;
            border: 1px solid #333;
            background: #111;
            color: #fff;
            outline: none;
        }
        button {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
        }
        #setup {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
    </style>
</head>
<body>

    <div id="setup">
        <h2>Grok API Key を入力</h2>
        <input type="password" id="api-key" placeholder="xai-..." style="width: 80%; margin-bottom: 20px;">
        <button onclick="saveKey()">チャット開始</button>
    </div>

    <div id="chat-container"></div>

    <div id="input-area">
        <input type="text" id="user-input" placeholder="Grokに質問する...">
        <button onclick="sendMessage()">送信</button>
    </div>

    <script>
        let apiKey = "";

        function saveKey() {
            apiKey = document.getElementById('api-key').value;
            if(apiKey) document.getElementById('setup').style.display = 'none';
        }

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const container = document.getElementById('chat-container');
            const text = input.value.trim();
            if (!text) return;

            // ユーザーのメッセージを表示
            appendMessage('user', text);
            input.value = "";

            try {
                const response = await fetch('https://api.x.ai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: "grok-beta", // または最新のモデル名
                        messages: [{ role: "user", content: text }],
                        stream: false
                    })
                });

                const data = await response.json();
                const grokText = data.choices[0].message.content;
                appendMessage('grok', grokText);

            } catch (error) {
                appendMessage('grok', "エラーが発生しました。APIキーを確認してください。");
                console.error(error);
            }
        }

        function appendMessage(sender, text) {
            const container = document.getElementById('chat-container');
            const div = document.createElement('div');
            div.classList.add('message', sender);
            div.innerText = text;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        // Enterキーで送信
        document.getElementById('user-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
